services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
    env_file:
      - .env
    restart: unless-stopped
  
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      - api
    restart: unless-stopped
